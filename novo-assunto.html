<html lang="pt-BR">
<body>
<h2>Elizane - introduçao e Desenvolvimento da Web</h2>

<!-- FORMULÁRIO - POST -->
<form id="post-form">

  <label for="input-title">Título</label>
  <input type="text" id="input-title" placeholder="Digite o título">

  <label for="input-conteudo">Conteúdo</label>
  <textarea id="input-conteudo" placeholder="Digite o conteúdo"></textarea>

  <button type="submit">Enviar POST</button>

</form>

<!-- A tag <pre> no HTML define um bloco de texto pré-formatado -->
<!-- RESPOSTA DO POST -->
<pre id="response-post"></pre>

<hr />

<!-- BOTÃO GET -->
<button id="btn-get">Buscar Posts (GET)</button>

<!-- LISTA DE POSTS -->
<ul id="post-list"></ul>

<script src="script2.js"></script>

</body>
</html>
